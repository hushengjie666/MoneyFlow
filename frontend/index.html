<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoneyFlow</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="container app-shell">
      <header class="top-nav" aria-label="主菜单">
        <button class="menu-btn active" data-target="homePanel">主页</button>
        <button class="menu-btn" data-target="recentPanel">近期事件</button>
        <button class="menu-btn" data-target="snapshotPanel">初始化存款</button>
        <button class="menu-btn" data-target="configPanel">设置</button>
      </header>

      <section id="homePanel" class="panel-page active">
        <p id="statusText" class="status toast hidden" aria-live="polite"></p>
        <div class="jump-spotlight" aria-live="polite">
          <div class="jump-topline">
            <span id="jumpTitle" class="jump-chip">资金数字跳动 · 每秒</span>
            <button id="openEventModalBtn" class="quick-event-btn" type="button">
              <span class="quick-event-btn-icon" aria-hidden="true">+</span>
              <span>快捷新增事件</span>
            </button>
          </div>
          <div id="jumpDelta" class="jump-delta" data-direction="flat">+0.000 元/秒</div>
          <div id="jumpStair" class="jump-stair" data-direction="flat" aria-hidden="true"></div>
          <div class="balance-inline balance-inline-bottom">
            <span class="jump-header">当前余额</span>
            <span id="jumpCurrent" class="jump-current-inline">¥0.00</span>
          </div>
          <div id="jumpTimestamp" class="jump-time">实时时间：----年--月--日 --:--:--</div>
        </div>

        <section class="panel goal-panel">
          <div class="goal-header">
            <h2>存款目标进度</h2>
            <span id="goalBadge" class="goal-badge">未设置</span>
          </div>
          <div class="goal-progress-track" aria-hidden="true">
            <div id="goalProgressFill" class="goal-progress-fill"></div>
          </div>
          <div class="goal-meta">
            <span id="goalProgressText">请先在设置中填写存款目标</span>
            <span id="goalEtaText">预计完成：--</span>
          </div>
        </section>
      </section>

      <section id="configPanel" class="panel-page">
        <section class="panel">
          <h2>跳动维度配置</h2>
          <form id="jumpConfigForm">
            <label for="jumpUnit">跳动展示维度</label>
            <select id="jumpUnit" name="jumpUnit">
              <option value="second">每秒</option>
              <option value="minute">每分</option>
              <option value="hour">每时</option>
              <option value="day">每天</option>
              <option value="week">每周</option>
              <option value="month">每月</option>
              <option value="year">每年</option>
            </select>
            <button type="submit">保存配置</button>
          </form>
        </section>
        <section class="panel">
          <h2>存款目标设置</h2>
          <form id="goalForm">
            <label for="goalTargetBalanceYuan">目标余额（元）</label>
            <input id="goalTargetBalanceYuan" name="goalTargetBalanceYuan" type="number" step="0.01" min="0.01" required />
            <button type="submit">保存目标</button>
          </form>
        </section>
        <section class="panel data-clear-panel">
          <h2>本地数据管理</h2>
          <p class="muted-tip">清除后将移除本地事件、初始化存款、存款目标与界面缓存配置。</p>
          <button id="clearLocalDataBtn" type="button" class="danger-action-btn">清除所有本地数据</button>
        </section>
      </section>

      <section id="snapshotPanel" class="panel-page">
        <section class="panel">
          <h2>初始化存款</h2>
          <form id="snapshotForm">
            <label for="initialBalanceYuan">初始存款（元）</label>
            <input id="initialBalanceYuan" name="initialBalanceYuan" type="number" step="0.01" required />
            <button type="submit">保存</button>
          </form>
        </section>
      </section>

      <section id="recentPanel" class="panel-page">
        <section class="panel">
          <ul id="eventList" class="event-list"></ul>
        </section>
      </section>
    </main>

    <div id="eventModal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="eventModalTitle">
      <section class="modal-panel">
        <div class="modal-header">
          <h2 id="eventModalTitle">新增资金事件</h2>
          <button id="closeEventModalBtn" class="modal-close-btn" type="button" aria-label="关闭">×</button>
        </div>
        <form id="eventForm">
          <label for="title">事件标题</label>
          <input id="title" name="title" type="text" maxlength="80" placeholder="例如：午餐支出、工资到账（可不填）" />

          <label for="amountYuan">金额（元）</label>
          <input id="amountYuan" name="amountYuan" type="number" min="0.01" step="0.01" required />

          <label for="direction">方向</label>
          <select id="direction" name="direction">
            <option value="outflow" selected>出项</option>
            <option value="inflow">入项</option>
          </select>

          <label for="eventKind">事件类型</label>
          <select id="eventKind" name="eventKind">
            <option value="one_time">一次性</option>
            <option value="recurring">周期性</option>
          </select>

          <label for="effectiveAt">生效时间</label>
          <input id="effectiveAt" name="effectiveAt" type="datetime-local" required />

          <div id="recurringFields" class="inline hidden">
            <div>
              <label for="recurrenceUnit">周期单位</label>
              <select id="recurrenceUnit" name="recurrenceUnit">
                <option value="month">月</option>
                <option value="week">周</option>
                <option value="day">天</option>
              </select>
            </div>
            <div>
              <label for="recurrenceInterval">周期间隔</label>
              <input id="recurrenceInterval" name="recurrenceInterval" type="number" min="1" value="1" />
            </div>
            <div>
              <label for="dailyStartTime">每日开始时间</label>
              <input id="dailyStartTime" name="dailyStartTime" type="time" value="00:01" />
            </div>
            <div>
              <label for="dailyEndTime">每日结束时间</label>
              <input id="dailyEndTime" name="dailyEndTime" type="time" value="23:59" />
            </div>
            <div class="weekdays-field">
              <label>生效日（周一到周日）</label>
              <div class="weekday-grid">
                <label class="weekday-chip"><input type="checkbox" name="activeWeekdays" value="1" checked />周一</label>
                <label class="weekday-chip"><input type="checkbox" name="activeWeekdays" value="2" checked />周二</label>
                <label class="weekday-chip"><input type="checkbox" name="activeWeekdays" value="3" checked />周三</label>
                <label class="weekday-chip"><input type="checkbox" name="activeWeekdays" value="4" checked />周四</label>
                <label class="weekday-chip"><input type="checkbox" name="activeWeekdays" value="5" checked />周五</label>
                <label class="weekday-chip"><input type="checkbox" name="activeWeekdays" value="6" checked />周六</label>
                <label class="weekday-chip"><input type="checkbox" name="activeWeekdays" value="7" checked />周日</label>
              </div>
            </div>
          </div>

          <button id="eventSubmitBtn" type="submit">创建事件</button>
        </form>
      </section>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
